name: croplens_app
description: "CropLens - AI-Powered Crop Disease Detection Mobile Application"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^3.3.2

  # Navigation
  go_router: ^17.3.0

  # Networking
  dio: ^5.7.0

  # Secure local storage (JWT tokens)
  flutter_secure_storage: ^10.3.1

  # Camera & image picking
  camera: ^0.12.0+1
  image_picker: ^1.1.2
  permission_handler: ^12.0.3

  # Images
  cached_network_image: ^3.4.1

  # Typography & animation polish
  google_fonts: ^8.1.0
  flutter_animate: ^4.5.0

  # Utilities
  intl: ^0.20.3
  equatable: ^2.0.5
  flutter_dotenv: ^6.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.jpg"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - .env
